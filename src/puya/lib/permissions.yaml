settings:
  # Actions affecting more than this many records require approval
  massive_threshold: 10
  # Pending actions expire after this many minutes
  pending_expiry_minutes: 10

roles:
  vendedor:
    # Read + write + create en TODOS los modelos. Métodos invocables vía
    # `puya odoo call` con methods_allowed=["*"]. Toda mutación pasa por
    # aprobación humana en Slack (always_approve).
    # unlink queda fuera por seguridad — no aparece en operations.
    # res.users restringido a solo lectura: bloquea creación y modificación
    # de email/password. Defensa adicional al PROTECTED_FIELDS (que ya
    # bloquea x_mcp_role en write/create de cualquier modelo).
    # INFRA_BLOCKED_MODELS hardcoded excluye ir.config_parameter,
    # res.users.apikeys, change.password.*, payment.token.
    always_approve: true
    models:
      "*":
        operations: [search_read, write, create]
      res.users:
        operations: [search_read]
    methods_allowed: ["*"]
    blocked_models: []
    rate_limit: 60

  administrativo:
    models:
      # Open read for all models
      "*":
        operations: [search_read]
      # Write/create on business models
      res.partner:
        operations: [search_read, write, create]
      sale.order:
        operations: [search_read, write, create]
      sale.order.line:
        operations: [search_read, write, create]
      account.move:
        operations: [search_read, write, create]
      account.payment:
        operations: [search_read, write, create]
      stock.picking:
        operations: [search_read, write]
      product.product:
        operations: [search_read, write]
      product.template:
        operations: [search_read, write]
      purchase.order:
        operations: [search_read]
    methods_allowed:
      - "sale.order:action_confirm"
      - "account.move:action_post"
      - "account.payment:action_post"
    blocked_models: []
    rate_limit: 120

  developer:
    models:
      "*":
        operations: [search_read, write, create, unlink]
    methods_allowed: ["*"]
    rate_limit: 300

  # Read-only: pensado para Puyol Dev (agente de coding interno) o cualquier
  # consumo de solo lectura. Lee todos los modelos (excepto INFRA_BLOCKED_MODELS
  # que gatea la lógica de rbac.py para non-developer). Cualquier write/create/
  # unlink/method falla con PermissionDenied — NO hay always_approve, así no
  # entra al flow de aprobación: todo intento de mutación es hard fail.
  read_only:
    models:
      "*":
        operations: [search_read]
    methods_allowed: []
    blocked_models: []
    rate_limit: 120
